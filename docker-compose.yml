services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/naohaiyi?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      # 素材存到项目目录下的 assets/，宿主机直接访问管理
      - ./assets:/app/.local-assets
      # 提示词模板，修改后无需重建镜像
      - ./prompts:/app/prompts:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/naohaiyi?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    deploy:
      replicas: 2
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    volumes:
      - ./assets:/app/.local-assets
      - ./prompts:/app/prompts:ro

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: naohaiyi
    expose:
      - "5432"
    volumes:
      # 数据库数据也存到项目目录
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d naohaiyi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory-policy noeviction
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
